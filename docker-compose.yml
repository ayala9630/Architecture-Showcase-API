version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: chinesesale_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chinesesale_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chinesesale_api
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000;https://+:5001
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_PASSWORD}
      - CacheSettings__Categories__GetAllTtlHours=24
      - CacheSettings__Categories__GetByIdTtlHours=24
      - CacheSettings__Lotteries__GetAllTtlHours=12
      - CacheSettings__Lotteries__GetByIdTtlHours=12
      - CacheSettings__Packages__GetAllByLotteryTtlHours=6
      - CacheSettings__Packages__GetByIdTtlHours=6
      - CacheSettings__Gifts__GetAllByLotteryTtlHours=5
      - CacheSettings__Gifts__GetByIdTtlHours=5
      - CacheSettings__Gifts__GetCountByLotteryTtlHours=5
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chinesesale_network

volumes:
  redis_data:

networks:
  chinesesale_network:
    driver: bridge